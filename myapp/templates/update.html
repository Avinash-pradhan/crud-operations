{% load django_browser_reload %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Article</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            background: #f5f7fb;
            color: #1f2937;
        }

        .form-wrapper {
            width: 100%;
            max-width: 760px;
            margin: 48px auto;
            padding: 0 20px;
        }

        .form-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }

        .navbar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e7eb;
            flex-wrap: wrap;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #334155;
            border: 1px solid #d1d5db;
            background: #ffffff;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .nav-links a:hover {
            border-color: #2563eb;
            color: #2563eb;
            background: #eff6ff;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 30px;
        }

        .subtitle {
            color: #6b7280;
            margin: 0 0 20px;
        }

        hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 20px 0 24px;
        }

        fieldset {
            border: none;
            padding: 0;
            margin: 0;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            font-weight: 600;
            margin-bottom: -10px;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            background: #f9fafb;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
            background: #ffffff;
        }

        .submit-button {
            margin-top: 8px;
            border: none;
            border-radius: 10px;
            padding: 13px 18px;
            background: #0f172a;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .submit-button:hover {
            background: #1e293b;
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .form-wrapper {
                margin: 28px auto;
                padding: 0 14px;
            }

            .form-card {
                padding: 22px 16px;
                border-radius: 14px;
            }

            .navbar {
                justify-content: stretch;
                margin-bottom: 22px;
            }

            .nav-links {
                width: 100%;
            }

            .nav-links a {
                flex: 1 1 180px;
                text-align: center;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 14px;
            }

            form {
                gap: 14px;
            }
        }

        @media (max-width: 480px) {
            .form-wrapper {
                margin: 18px auto;
                padding: 0 10px;
            }

            .form-card {
                padding: 18px 14px;
            }

            .nav-links a {
                flex-basis: 100%;
            }

            h1 {
                font-size: 22px;
            }

            input,
            .submit-button {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="form-wrapper">
        <div class="form-card">
            <div class="navbar">
                <div class="nav-links">
                    <a href="{% url 'home' %}">Home</a>
                    <a href="{% url 'articles' %}">All Articles</a>
                </div>
            </div>

            <h1>Update Article</h1>
            <p class="subtitle">Edit the details below and save your changes.</p>
            <hr>

            <fieldset>
                <form action="" method="post">
                    {% csrf_token %}

                    <label for="title">Title</label>
                    <input type="text" name="title" id="title" placeholder="Enter Title" value="{{ articles.title }}" required>

                    <label for="description">Description</label>
                    <input type="text" name="description" id="description" placeholder="Enter Description" value="{{ articles.description }}" required>

                    <label for="author">Author</label>
                    <input type="text" name="author" id="author" placeholder="Enter Name" value="{{ articles.author }}" required>

                    <label for="date">Date</label>
                    <input type="date" name="date" id="date" value="{{ articles.date|date:'Y-m-d' }}" required>

                    <button class="submit-button" type="submit">Update</button>
                </form>
            </fieldset>
        </div>
    </div>

    {% django_browser_reload_script %}
</body>
</html>
